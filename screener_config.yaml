# Nifty100 Stock Screener Configuration
# Contains filter thresholds for all 15 supported metrics.
#
# Supported metrics:
# - return_on_equity_pct (min) / ROE
# - debt_to_equity (max) / Debt-to-Equity
# - free_cash_flow_cr (min) / Free Cash Flow
# - revenue_cagr_5yr (min) / Revenue CAGR 5Y
# - pat_cagr_5yr (min) / PAT CAGR 5Y
# - operating_profit_margin_pct (min) / Operating Profit Margin
# - pe_ratio (max) / P/E
# - pb_ratio (max) / P/B
# - dividend_yield_pct (min) / Dividend Yield
# - interest_coverage (min) / Interest Coverage Ratio
# - market_cap_crore (min) / Market Cap
# - net_profit (min) / Net Profit
# - eps_cagr_5yr (min) / EPS CAGR
# - asset_turnover (min) / Asset Turnover
# - sales (min) / Sales

filters:
  ROE:
    min: 15.0
  Debt-to-Equity:
    max: 1.0
  Free Cash Flow:
    min: 0.0          # in Crores (relaxed)
  Revenue CAGR 5Y:
    min: -20.0        # relaxed
  PAT CAGR 5Y:
    min: -20.0        # relaxed
  Operating Profit Margin:
    min: 0.0          # relaxed
  P/E:
    max: 100.0        # relaxed
  P/B:
    max: 25.0         # relaxed
  Dividend Yield:
    min: 0.0          # relaxed
  Interest Coverage Ratio:
    min: 1.5          # relaxed
  Market Cap:
    min: 1000.0       # in Crores (relaxed)
  Net Profit:
    min: 0.0          # in Crores (relaxed)
  EPS CAGR:
    min: -20.0        # relaxed
  Asset Turnover:
    min: 0.0          # relaxed
  Sales:
    min: 0.0          # in Crores (relaxed)
